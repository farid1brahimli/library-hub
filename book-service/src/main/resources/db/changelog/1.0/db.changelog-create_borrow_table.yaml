databaseChangeLog:
  - changeSet:
      id: 07012026
      author: farid1brahimli

      changes:
        - createTable:
            tableName: borrows
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_borrows
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: borrowed_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: due_time
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: returned_at
                  type: TIMESTAMP

              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: book_id
                  type: BIGINT

        - addForeignKeyConstraint:
            baseTableName: borrows
            baseColumnNames: book_id
            referencedTableName: books
            referencedColumnNames: id
            constraintName: fk_borrows_book