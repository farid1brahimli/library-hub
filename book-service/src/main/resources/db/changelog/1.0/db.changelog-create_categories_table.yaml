databaseChangeLog:
  - changeSet:
      id: 07012026
      author: farid1brahimli

      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_categories
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false