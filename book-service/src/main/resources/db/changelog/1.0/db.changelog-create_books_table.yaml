databaseChangeLog:
  - changeSet:
      id: 07012026
      author: farid1brahimli

      changes:
        - createTable:
            tableName: books
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: author
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: isbn
                  type: VARCHAR(20)
                  constraints:
                    unique: true
                    nullable: false

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: total_copies
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: available_copies
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: published_year
                  type: INT

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: category_id
                  type: BIGINT

        - addForeignKeyConstraint:
            baseTableName: books
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_books_category