spring:
  application:
    name: book-service
  datasource:
    url: jdbc:postgresql://localhost:5432/books_db
    username: postgres
    password: password
  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    hibernate:
      ddl-auto: validate
  cache:
    type: redis
  data:
    redis:
      port: 6379
      host: localhost
  rabbitmq:
    stream:
      username: guest
      password: guest
    port: 5672
    host: localhost
server:
  port: 8082