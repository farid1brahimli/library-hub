spring:
  application:
    name: book-service
  datasource:
    url: jdbc:postgresql://localhost:5432/books_db
    username: postgres
    password: password
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    hibernate:
      ddl-auto: validate
server:
  port: 8082